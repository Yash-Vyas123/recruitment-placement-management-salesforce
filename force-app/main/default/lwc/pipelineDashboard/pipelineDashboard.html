<template>
    <lightning-card title="Recruitment Pipeline" icon-name="standard:recruiting">
        <div class="slds-p-around_medium">
            <template if:true={pipelineData}>
                <template for:each={pipelineData} for:item="stage">
                    <div key={stage.status} class="slds-grid slds-p-vertical_x-small">
                        <div class="slds-col slds-size_2-of-3">
                            <span class="slds-text-body_regular">{stage.status}</span>
                        </div>
                        <div class="slds-col slds-size_1-of-3 slds-text-align_right">
                            <span class="slds-badge">{stage.count}</span>
                        </div>
                    </div>
                </template>
            </template>
            <template if:true={error}>
                <p class="slds-text-color_error">Error loading pipeline data.</p>
            </template>
        </div>
    </lightning-card>
</template>
